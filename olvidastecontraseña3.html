<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden; 
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center relative p-4">

  <header class="fixed top-6 left-8 flex items-center gap-3 z-10">
    <img
      src="assets/images/logo-sena-verde-complementario-svg-2022.svg"
      alt="Logo SENA"
      class="w-14 h-14 object-contain">
    
    <h2 class="text-[#043224] font-extrabold text-2xl uppercase tracking-wider">
      AVISENA COL
    </h2>
  </header>
  
  <main class="bg-white w-full max-w-md rounded-[1rem] px-10 py-16 shadow-2xl text-center">

    <h1 class="text-black text-4xl font-extrabold leading-tight">
      Restablecer <br> contraseña
    </h1>

    <form id="resetForm" class="mt-12 space-y-6">
      
      <input
        id="newPass"
        type="password"
        placeholder="Contraseña nueva"
        class="w-full bg-white/10 text-black text-center text-lg py-5 rounded-2xl placeholder:text-black/50 focus:ring-2 focus:ring-green-400 outline-none border-none shadow-inner">

      <input
        id="confirmPass"
        type="password"
        placeholder="Confirmación de contraseña"
        class="w-full bg-white/10 text-black text-center text-lg py-5 rounded-2xl placeholder:text-black/50 focus:ring-2 focus:ring-green-400 outline-none border-none shadow-inner">

      <button id="submitBtn" type="submit"
        class="bg-[#22c55e] hover:bg-[#16a34a] text-white font-bold py-4 text-lg rounded-full w-full mt-4 transition-all transform hover:scale-105 shadow-lg">
        CONFIRMAR CAMBIO
      </button>
    </form>

  </main>

  <a href="index.html"
    class="fixed bottom-8 left-8 bg-[#22c55e] hover:bg-[#16a34a] text-white font-bold px-10 py-3 rounded-full shadow-xl transition-all z-10">
    SALIR
  </a>

  <script src="assets/js/contraseña3.js"></script>

</body>
</html>
