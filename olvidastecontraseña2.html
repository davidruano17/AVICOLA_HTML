<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ingresar codigo</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center relative p-4">

    <header class="fixed top-6 left-8 flex items-center gap-3 z-10">
        <img src="assets/images/logo-sena-verde-complementario-svg-2022.svg"
            alt="Logo SENA" class="w-14 h-14 object-contain">

        <h2 class="text-[#043224] font-extrabold text-2xl uppercase tracking-wider">
            AVISENA COL
        </h2>
    </header>

    <main class="bg-whites w-full max-w-md rounded-[1rem] px-10 py-16 shadow-2xl text-center">

        <h1 class="text-black text-4xl font-extrabold leading-tight">
            Recuperación <br> de contraseña
        </h1>

        <p class="text-black/80 mt-6 text-base leading-relaxed">
            Por favor ingresa el código de 6 dígitos enviado al correo electrónico
            que tienes registrado en el aplicativo.
        </p>

        <form id="recoverForm" class="mt-10 space-y-8">
            <input id="code" type="text" maxlength="6" placeholder="Código de verificación"
                class=" text-black text-center text-lg py-5 rounded-2xl placeholder:text-black/50 tracking-[0.5em] focus:ring-2 focus:ring-green-400 outline-none border-none shadow-inner">

            <span id="errorMsg" class="hidden block text-red-300 text-sm font-medium">
                Debes ingresar un código válido de 6 dígitos
            </span>

            <button id="submitBtn" type="submit"
                class="bg-[#22c55e] hover:bg-[#16a34a] text-white font-bold py-4 text-lg rounded-full w-full transition-all transform hover:scale-105 shadow-lg">
                ENVIAR
            </button>
        </form>

    </main>

    <a href="index.html"
        class="fixed bottom-8 left-8 bg-[#22c55e] hover:bg-[#16a34a] text-white font-bold px-10 py-3 rounded-full shadow-xl transition-all z-10">
        SALIR
    </a>

  <script src="assets/js/contraseña2.js"></script>

</body>

</html>
