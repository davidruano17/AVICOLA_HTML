<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Usuarios - AVISENA COL</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-[#f5faf6] min-h-screen font-['Inter']">

    <header class="flex items-center justify-between border-b border-solid border-[#eaf3e7] dark:border-emerald-900/30 px-6 py-4 md:px-40 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
        <section class="flex items-center gap-3">
            <img src="assets/images/logo-sena-verde-complementario-svg-2022.svg" alt="Logo SENA" class="w-12 h-12 object-contain">
            <h2 class="text-[#111b0e] dark:text-slate-100 text-xl font-black uppercase tracking-tight">
                AVISENA COL
            </h2>
        </section>
        <p class="text-slate-500 dark:text-slate-400 text-base mt-2 ">
            Sistema de Gestión Avícola
        </p>
    </header>

    <main class="flex justify-center items-center py-10 px-4">
        <article class="bg-white w-full max-w-3xl rounded-3xl shadow-lg border border-gray-100 p-10">
            <header class="text-center mb-8">
                <h2 class="text-3xl font-black text-[#111b0e]">Registro de Usuarios</h2>
                <p class="text-gray-500 mt-2 text-sm">Únete a la plataforma de gestión avícola inteligente.</p>
            </header>

            <form id="form-registro" class="space-y-6">
                <label class="block">
                    <p class="text-sm font-bold text-gray-700 mb-2">Nombre Completo</p>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required
                        class="w-full rounded-xl border-gray-200 px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                </label>

                <label class="block">
                    <p class="text-sm font-bold text-gray-700 mb-2">Correo Electrónico</p>
                    <input type="email" id="email" placeholder="usuario@avisena.com" required
                        class="w-full rounded-xl border-gray-200 px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                </label>

                <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <label class="block">
                        <p class="text-sm font-bold text-gray-700 mb-2">Tipo de Documento</p>
                        <select
                            class="w-full rounded-xl border-gray-200 px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                            <option>Cédula de Ciudadanía</option>
                            <option>Tarjeta de Identidad</option>
                            <option>Pasaporte</option>
                            <option>Cédula extranjera</option>
                        </select>
                    </label>
                    <label class="block">
                        <p class="text-sm font-bold text-gray-700 mb-2">Número de Documento <span
                                class="text-red-500">*</span></p>
                        <input type="text" id="documento" required
                            class="w-full rounded-xl border-gray-200 px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                    </label>
                </section>

                <label class="block relative">
                    <p class="text-sm font-bold text-gray-700 mb-2">Contraseña</p>
                    <input id="password" type="password" required
                        placeholder="Mínimo 10 caracteres y un caracter especial"
                       class="w-full rounded-xl border-gray-200 px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                </label>

                <button type="submit"
                    class="flex items-center justify-center w-full bg-[#49e619] hover:bg-[#3dbd14] text-black text-xl font-bold py-4 rounded-xl shadow-md transition-all active:scale-[0.98]">
                    Registrarse
                </button>

                <p class="text-center text-sm text-gray-500">
                    ¿Ya tienes una cuenta? <a href="iniciosesion.html"
                        class="text-[#49e619] font-bold hover:underline">Inicia sesión</a>
                </p>
            </form>
        </article>
    </main>
     <footer class="py-8 px-6 text-center border-t border-emerald-100 dark:border-emerald-900/20">
        <p class="text-slate-400 text-xs font-medium">
            © 2026 AVISENA COL - SENA. Innovación y Sostenibilidad Avícola.
        </p>
    </footer>

    <script src="assets/js/registro.js"></script>
    </body>
</html>
