<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Usuarios - AVISENA COL</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-[#f5faf6] min-h-screen font-['Inter']">

    <header class="w-full bg-white shadow-sm">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <section class="flex items-center gap-1">
                <img src="assets/images/logo-sena-verde-complementario-svg-2022.svg"
                    class="w-9 h-9 " alt="Logo">
                <strong class="text-2xl font-extrabold uppercase text-[#0B5D3B] tracking-wide">AVISENA COL</strong>
            </section>
            
        </nav>
    </header>

    <main class="flex justify-center items-center py-10 px-4">
        <article class="bg-white w-full max-w-3xl rounded-3xl shadow-lg border border-gray-100 p-10">
            <header class="text-center mb-8">
                <h2 class="text-3xl font-bold text-[#1e293b]">Registro de Usuarios</h2>
                <p class="text-gray-500 mt-2 text-sm">Únete a la plataforma de gestión avícola inteligente.</p>
            </header>

            <form id="form-registro" class="space-y-6">
                <label class="block">
                    <p class="text-sm font-bold text-gray-700 mb-2">Nombre Completo</p>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required
                        class="w-full rounded-xl border-gray-200 px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                </label>

                <label class="block">
                    <p class="text-sm font-bold text-gray-700 mb-2">Correo Electrónico</p>
                    <input type="email" id="email" placeholder="usuario@avisena.com" required
                        class="w-full rounded-xl border-gray-200 px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                </label>

                <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <label class="block">
                        <p class="text-sm font-bold text-gray-700 mb-2">Tipo de Documento</p>
                        <select
                            class="w-full rounded-xl border-gray-200 px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                            <option>Cédula de Ciudadanía</option>
                            <option>Tarjeta de Identidad</option>
                            <option>Pasaporte</option>
                            <option>Cédula extranjera</option>
                        </select>
                    </label>
                    <label class="block">
                        <p class="text-sm font-bold text-gray-700 mb-2">Número de Documento <span
                                class="text-red-500">*</span></p>
                        <input type="text" id="documento" required
                            class="w-full rounded-xl border-none bg-[#eff6ff] px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none font-medium">
                    </label>
                </section>

                <label class="block relative">
                    <p class="text-sm font-bold text-gray-700 mb-2">Contraseña</p>
                    <input id="password" type="password" required
                        placeholder="Mínimo 10 caracteres y un caracter especial"
                        class="w-full rounded-xl border-none bg-[#eff6ff] px-4 py-3 focus:ring-2 focus:ring-green-400 outline-none">
                </label>

                <button type="submit"
                    class="flex items-center justify-center w-full bg-[#22c55e] hover:bg-[#16a34a] text-white text-xl font-bold py-4 rounded-xl shadow-md transition-all active:scale-[0.98]">
                    Registrarse
                </button>

                <p class="text-center text-sm text-gray-500">
                    ¿Ya tienes una cuenta? <a href="iniciosesion.html"
                        class="text-green-600 font-bold hover:underline">Inicia sesión</a>
                </p>
            </form>
        </article>
    </main>

    <script src="assets/js/registro.js"></script>
    </body>
</html>
