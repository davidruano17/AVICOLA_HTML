<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Perfil - AVISENA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/perfil_configuracion.css">
</head>
<body>

    <article>
        <header>
            <figure>
                <img src="https://ui-avatars.com/api/?name=Juan+Perez&background=5be830&color=fff" alt="Foto de Juan Pérez">
            </figure>
            <hgroup>
                <h1>Juan Pérez</h1>
                <p>juan.perez@granja.com</p>
            </hgroup>
        </header>

        <nav aria-label="Menú de cuenta">
            <a href="opcionperfil.html">
                <i><span class="material-symbols-outlined">person</span></i>
                <section>
                    <strong>Mi Perfil</strong>
                    <span>Datos personales y granja</span>
                </section>
                <span class="material-symbols-outlined chevron">chevron_right</span>
            </a>

            <a href="#">
                <i><span class="material-symbols-outlined">settings</span></i>
                <section>
                    <strong>Configuración</strong>
                    <span>Alertas y preferencias</span>
                </section>
                <span class="material-symbols-outlined chevron">chevron_right</span>
            </a>
        </nav>

        <footer>
            <a href="index.html" style="text-decoration: none;">
                <button type="button">
                    <span class="logout-icon">
                        <span class="material-symbols-outlined">logout</span>
                    </span>
                    <section style="text-align: left;">
                        <strong style="color: var(--danger);">Cerrar Sesión</strong>
                        <span style="color: var(--danger); opacity: 0.7;">Finalizar sesión actual</span>
                    </section>
                </button>
            </a>
        </footer>
    </article>

</body>
</html>
